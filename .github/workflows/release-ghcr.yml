name: Release GHCR

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

concurrency:
  group: release-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/henricos/hiring-pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert release commit belongs to main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Derive release metadata
        shell: bash
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Assert package.json matches release tag
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release tag version ($RELEASE_VERSION)" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/henricos/hiring-pipeline:${{ env.RELEASE_TAG }}
            ghcr.io/henricos/hiring-pipeline:latest
          build-args: |
            APP_VERSION=${{ env.RELEASE_VERSION }}
            NEXT_PUBLIC_GIT_HASH=${{ env.SHORT_SHA }}
            APP_BASE_PATH=/hiring-pipeline
          labels: |
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ai-pkm | Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "slate": {
                "50": "#f8fafc",
                "100": "#f1f5f9",
                "200": "#e2e8f0",
                "300": "#cbd5e1",
                "400": "#94a3b8",
                "500": "#64748b",
                "600": "#475569",
                "700": "#334155",
                "800": "#1e293b",
                "900": "#0f172a",
                "950": "#020617"
              },
              "blue": {
                "400": "#60a5fa",
                "600": "#2563eb",
                "700": "#1d4ed8"
              }
            },
            "fontFamily": {
              "sans": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 1.25rem;
        }
        .modern-input {
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex items-center justify-center selection:bg-blue-100 selection:text-blue-700">
<!-- Main Access Canvas -->
<main class="w-full max-w-[400px] p-6">
<div class="bg-white p-8 border border-slate-200 rounded-xl shadow-sm">
<div class="mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-blue-600">memory</span>
<span class="text-xl font-bold tracking-tighter text-slate-900">ai-pkm</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 tracking-tight">System Access</h1>
<p class="text-slate-500 text-sm mt-1">Authorized curators only.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500" for="username">Username</label>
<input class="w-full bg-white py-2.5 px-3 modern-input text-sm text-slate-900 placeholder:text-slate-400" id="username" name="username" placeholder="curator_id" required="" type="text"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500" for="password">Password</label>
<button class="text-slate-400 hover:text-blue-600 transition-colors text-xs font-medium" type="button">Show</button>
</div>
<input class="w-full bg-white py-2.5 px-3 modern-input text-sm text-slate-900 placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Sleek Alert -->
<div class="flex items-center gap-3 p-3 bg-red-50 border border-red-100 rounded-md">
<span class="material-symbols-outlined text-red-500 text-[18px]">info</span>
<p class="text-[12px] font-medium text-red-700">
                    Authentication required to access the central archive.
                </p>
</div>
<button class="w-full bg-blue-600 text-white py-3 font-semibold text-sm rounded-md hover:bg-blue-700 active:scale-[0.98] transition-all shadow-sm" type="submit">
                Sign In
            </button>
</form>
</div>
<footer class="mt-8 text-center">
<div class="flex items-center justify-center gap-4 text-slate-400 text-[11px] font-medium uppercase tracking-[0.1em]">
<span>Encrypted</span>
<span class="w-1 h-1 bg-slate-300 rounded-full"></span>
<span>V. 2.4.0</span>
</div>
</footer>
</main>
</body></html>
